# Bloqueia acessos diretos via IP e domínios não reconhecidos
server {
    listen 80 default_server;
    server_name _;
    
    # O 444 é um código exclusivo do Nginx que fecha a conexão 
    # imediatamente sem enviar absolutamente nada de volta para o bot
    return 444; 
}

# HTTP -> HTTPS (mantém ACME em HTTP)
server {
  listen 80;
  listen [::]:80; # Boa prática adicionar IPv6, já que o Let's Encrypt tenta usá-lo
  server_name igrejabatistajmv.com.br www.igrejabatistajmv.com.br;

  # 1. Rota exclusiva para o desafio do Certbot (NÃO redireciona)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location ~* ^/(category|author|wp-content|wp-includes|202[0-5]) {
    return 301 https://$host/;
  }

  # 2. Redireciona todo o RESTO (tráfego normal do site) para HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name igrejabatistajmv.com.br www.igrejabatistajmv.com.br;

  ssl_certificate     /etc/letsencrypt/live/www.igrejabatistajmv.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.igrejabatistajmv.com.br/privkey.pem;

  location /.well-known/acme-challenge/ {
    alias /var/www/certbot/.well-known/acme-challenge/;
  }

  location ~* ^/(category|author|wp-content|wp-includes|202[0-5]) {
    return 301 https://$host/;
  }

  location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp)$ {
    expires 30d;
    add_header Cache-Control "public, no-transform";
    try_files $uri =404;
  }

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ /\.(?!well-known) {
    deny all;
    return 404;
  }

  location ~* ^/(stalker_portal|streaming|ministra|wp-admin|wp-login|xmlrpc\.php|vendor/) {
    return 404;
  }

  location / {
    try_files $uri /index.html;
  }
}
